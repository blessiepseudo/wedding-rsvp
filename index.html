<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding RSVP</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#444;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:#8d6e63;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#6d4c41;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Wedding RSVP</h2>

<input
id="guestName"
placeholder="Enter your full name">

<select id="attendance">
<option value="">Will you attend?</option>
<option>Yes, I will attend</option>
<option>No, I cannot attend</option>
</select>

<button onclick="submitRSVP()">
Submit RSVP
</button>

<div id="message"></div>

<hr>

<button onclick="downloadCSV()">
Download RSVP List
</button>

</div>

<script>

//==============================
// EDIT GUEST LIST HERE
//==============================

const guests=[

{name:"Emma Johnson",rsvp:"Pending"},
{name:"Liam Carter",rsvp:"Pending"},
{name:"Olivia Brooks",rsvp:"Pending"},
{name:"Noah Evans",rsvp:"Pending"},
{name:"Sophia Reed",rsvp:"Pending"},
{name:"James Foster",rsvp:"Pending"},
{name:"Ava Morgan",rsvp:"Pending"},
{name:"Benjamin Ross",rsvp:"Pending"},
{name:"Charlotte Hayes",rsvp:"Pending"},
{name:"Lucas Perry",rsvp:"Pending"},
{name:"Mia Collins",rsvp:"Pending"},
{name:"Henry Cooper",rsvp:"Pending"},
{name:"Amelia Ward",rsvp:"Pending"},
{name:"William Murphy",rsvp:"Pending"},
{name:"Harper Sanders",rsvp:"Pending"},
{name:"Elijah Price",rsvp:"Pending"},
{name:"Evelyn Bennett",rsvp:"Pending"},
{name:"Daniel Kelly",rsvp:"Pending"},
{name:"Grace Howard",rsvp:"Pending"},
{name:"Michael Turner",rsvp:"Pending"}

];

//==============================

function submitRSVP(){

let name=document.getElementById("guestName").value.trim();
let attendance=document.getElementById("attendance").value;

if(name==""){
alert("Please enter your name.");
return;
}

if(attendance==""){
alert("Please choose your RSVP.");
return;
}

let guest=guests.find(g=>g.name.toLowerCase()==name.toLowerCase());

if(!guest){

document.getElementById("message").innerHTML=
"<span style='color:red'>Sorry, your name is not on the guest list.</span>";

return;

}

guest.rsvp=attendance;

document.getElementById("message").innerHTML=
"<span style='color:green'>Thank you "+guest.name+"! Your RSVP has been recorded.</span>";

console.log(guests);

}

//==============================

function downloadCSV(){

let csv="Guest Name,RSVP\n";

guests.forEach(g=>{

csv+=`${g.name},${g.rsvp}\n`;

});

let blob=new Blob([csv],{type:"text/csv"});

let url=URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;

a.download="RSVP_List.csv";

a.click();

}

//==============================

</script>

</body>
</html>
